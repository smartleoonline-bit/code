name: Build Meetus WORKSPACE16

on:
  push:
    branches: [main]
    paths:
      - 'workspace16/**'
      - '.github/workflows/build-workspace16.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail
          NAME='meetus-telegram-discussions-v06252-community2tg11workspace16'
          rm -rf build dist
          mkdir -p "build/$NAME" dist
          cp -a workspace16/. "build/$NAME/"
          chmod +x "build/$NAME/install.sh"
          (
            cd "build/$NAME"
            find . -type f ! -name MANIFEST.sha256 -print0 \
              | sort -z \
              | xargs -0 sha256sum > MANIFEST.sha256
          )
          tar -C build -czf "dist/$NAME.tar.gz" "$NAME"
          sha256sum "dist/$NAME.tar.gz" > "dist/$NAME.tar.gz.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meetus-workspace16
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Commit generated archive
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Meetus Builder'
          git config user.email 'builder@users.noreply.github.com'
          git add -f dist/
          if git diff --cached --quiet; then
            echo 'Archive unchanged'
          else
            git commit -m 'Build Meetus WORKSPACE16 archive'
            git push
          fi
