name: Snapshot Meetus frontend

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/snapshot.yml'

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download live frontend
        shell: bash
        run: |
          set -euo pipefail
          rm -rf snapshot
          mkdir -p snapshot
          python3 - <<'PY'
          import os, re, urllib.parse, urllib.request
          base='https://app.meetus.kz/'
          req=urllib.request.Request(base, headers={'User-Agent':'Mozilla/5.0'})
          html=urllib.request.urlopen(req, timeout=30).read()
          open('snapshot/index.html','wb').write(html)
          text=html.decode('utf-8','replace')
          refs=[]
          refs += re.findall(r'<script[^>]+src=["\']([^"\']+)', text, flags=re.I)
          refs += re.findall(r'<link[^>]+href=["\']([^"\']+)', text, flags=re.I)
          seen=set()
          for ref in refs:
              url=urllib.parse.urljoin(base, ref)
              p=urllib.parse.urlparse(url)
              if p.netloc != 'app.meetus.kz':
                  continue
              name=os.path.basename(p.path)
              if not name or name in seen or not name.lower().endswith(('.js','.css','.json')):
                  continue
              seen.add(name)
              try:
                  data=urllib.request.urlopen(urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'}), timeout=60).read()
                  open(os.path.join('snapshot',name),'wb').write(data)
                  print(name, len(data), url)
              except Exception as e:
                  print('FAILED', url, e)
          open('snapshot/assets.txt','w',encoding='utf-8').write('\n'.join(refs))
          PY
      - name: Commit snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add snapshot
          if git diff --cached --quiet; then
            echo 'No snapshot changes'
          else
            git commit -m 'Snapshot live Meetus frontend'
            git push
          fi
